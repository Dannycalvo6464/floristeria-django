<!DOCTYPE html>
<html>
<head>
    <title>Actualizar Usuario</title>
</head>
<body>

<h1>Actualizar Usuario - Flores Cali</h1>

<a href="/panel_admin/">
    Volver al Panel
</a>

<form method="post">
    {% csrf_token %}

    <label>Nombre a buscar:</label><br>
    <input type="text" name="nombre">
    <button type="submit" name="buscar">
        Buscar
    </button>
</form>

<hr>

{% if usuario %}

<form method="post">
    {% csrf_token %}

    <input
        type="hidden"
        name="id"
        value="{{ usuario.id }}"
    >

    <label>Nombre:</label><br>
    <input
        type="text"
        name="nombre"
        value="{{ usuario.nombre }}"
    >
    <br><br>

    <label>Correo:</label><br>
    <input
        type="email"
        name="correo"
        value="{{ usuario.correo }}"
    >
    <br><br>

    <label>Contraseña:</label><br>
    <input
        type="text"
        name="contrasena"
        value="{{ usuario.contrasena }}"
    >
    <br><br>

    <button
        type="submit"
        name="actualizar"
    >
        Actualizar
    </button>

</form>


{% endif %}

</body>
</html>
